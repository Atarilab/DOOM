name: ATARI DOOM Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive
          # Use the default GITHUB_TOKEN unless you have a specific need for a PAT
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build unitree_mujoco_container/.devcontainer/. --tag mujuni-image:$(date +%s)
