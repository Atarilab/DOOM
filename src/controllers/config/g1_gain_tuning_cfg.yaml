# Configuration file for G1 Gain Tuning Controller
# This controller performs continuous oscillatory movements between two joint configurations
# to help tune P-D gains for each joint

control_dt: 0.002
decimation: 10
use_threading: False
debug: false
device: "cpu"

# Controller-specific parameters
cycle_time: 4.0  # Time for one complete cycle (A->B->A) in seconds
min_cycle_time: 1.0
max_cycle_time: 20.0

# Default P gains for each joint (29 motors total)
default_kps:
  # Leg joints (12 motors)
  - 100  # Left hip pitch
  - 100  # Left hip roll
  - 100  # Left hip yaw
  - 150  # Left knee
  - 40   # Left ankle pitch
  - 40   # Left ankle roll
  - 100  # Right hip pitch
  - 100  # Right hip roll
  - 100  # Right hip yaw
  - 150  # Right knee
  - 40   # Right ankle pitch
  - 40   # Right ankle roll
  # Waist joints (3 motors)
  - 300  # Waist yaw
  - 300  # Waist roll
  - 300  # Waist pitch
  # Arm joints (14 motors)
  - 40  # Left shoulder pitch
  - 40  # Left shoulder roll
  - 40   # Left shoulder yaw
  - 40   # Left elbow
  - 40   # Left wrist roll
  - 40   # Left wrist pitch
  - 40   # Left wrist yaw
  - 40  # Right shoulder pitch
  - 40  # Right shoulder roll
  - 40   # Right shoulder yaw
  - 40   # Right elbow
  - 40   # Right wrist roll
  - 40   # Right wrist pitch
  - 40   # Right wrist yaw

default_joint_pos: [
                  -0.4500,  0.5000,  0.0000,  0.5000,  0.0000, 0.0000, -0.8000,
                  -0.4500, -0.5000,  0.0000,  0.5000,  0.0000,  0.0000, 0.8000
                  ]

# Default D gains for each joint (29 motors total)
default_kds:
  # Leg joints (12 motors)
  - 2  # Left hip pitch
  - 2  # Left hip roll
  - 2  # Left hip yaw
  - 4  # Left knee
  - 2  # Left ankle pitch
  - 2  # Left ankle roll
  - 2  # Right hip pitch
  - 2  # Right hip roll
  - 2  # Right hip yaw
  - 4  # Right knee
  - 2  # Right ankle pitch
  - 2  # Right ankle roll
  # Waist joints (3 motors)
  - 3  # Waist yaw
  - 3  # Waist roll
  - 3  # Waist pitch
  # Arm joints (14 motors)
  - 10  # Left shoulder pitch
  - 10  # Left shoulder roll
  - 10  # Left shoulder yaw
  - 10  # Left elbow
  - 10  # Left wrist roll
  - 10  # Left wrist pitch
  - 10  # Left wrist yaw
  - 10  # Right shoulder pitch
  - 10  # Right shoulder roll
  - 10  # Right shoulder yaw
  - 10  # Right elbow
  - 5  # Right wrist roll
  - 5  # Right wrist pitch
  - 5  # Right wrist yaw

# Joint configuration for position A (default/rest position)
position_a:
  # Leg joints (12 motors)
  - -0.1  # Left hip pitch
  - 0.0   # Left hip roll
  - 0.0   # Left hip yaw
  - 0.3   # Left knee
  - -0.2  # Left ankle pitch
  - 0.0   # Left ankle roll
  - -0.1  # Right hip pitch
  - 0.0   # Right hip roll
  - 0.0   # Right hip yaw
  - 0.3   # Right knee
  - -0.2  # Right ankle pitch
  - 0.0   # Right ankle roll
  # Waist joints (3 motors)
  - 0.0   # Waist yaw
  - 0.0   # Waist roll
  - 0.0   # Waist pitch
  # Arm joints (14 motors)
  - 0.0   # Left shoulder pitch
  - 0.0   # Left shoulder roll
  - 0.0   # Left shoulder yaw
  - 0.0   # Left elbow
  - 0.0   # Left wrist roll
  - 0.0   # Left wrist pitch
  - 0.0   # Left wrist yaw
  - 0.0   # Right shoulder pitch
  - 0.0   # Right shoulder roll
  - 0.0   # Right shoulder yaw
  - 0.0   # Right elbow
  - 0.0   # Right wrist roll
  - 0.0   # Right wrist pitch
  - 0.0   # Right wrist yaw

# Joint configuration for position B (target position)
position_b:
  # Leg joints (12 motors)
  - -0.1  # Left hip pitch
  - 0.0   # Left hip roll
  - 0.0   # Left hip yaw
  - 0.3   # Left knee
  - -0.2  # Left ankle pitch
  - 0.0   # Left ankle roll
  - -0.1  # Right hip pitch
  - 0.0   # Right hip roll
  - 0.0   # Right hip yaw
  - 0.3   # Right knee
  - -0.2  # Right ankle pitch
  - 0.0   # Right ankle roll
  # Waist joints (3 motors)
  - 0.0   # Waist yaw
  - 0.0   # Waist roll
  - 0.0   # Waist pitch
  # Arm joints (14 motors)
  - 0.0   # Left shoulder pitch
  - 1.3   # Left shoulder roll
  - 0.0   # Left shoulder yaw
  - 1.3   # Left elbow
  - 0.0   # Left wrist roll
  - 0.0   # Left wrist pitch
  - 0.0   # Left wrist yaw
  - 0.0   # Right shoulder pitch
  - -1.3   # Right shoulder roll
  - 0.0   # Right shoulder yaw
  - 1.3   # Right elbow
  - 0.0   # Right wrist roll
  - 0.0   # Right wrist pitch
  - 0.0   # Right wrist yaw

# Gain tuning ranges
gain_limits:
  kp_min: 0.0
  kp_max: 1000.0
  kd_min: 0.0
  kd_max: 100.0

# UI configuration
ui_config:
  show_gain_sliders: true
  show_cycle_time_control: true
  show_reset_button: true
  show_status_display: true
