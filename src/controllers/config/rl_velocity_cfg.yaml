policy_path: "policies/IsaacLab policies/flatAmpVision/2025-08-06_18-54-23_flat_test_DR5_improved_minimal_motion_files_SEED_1/policy.pt"
# Taping the feet is necessary for good sim2real
# This policy is the best: "policies/IsaacLab policies/flatAmpVision/2025-08-08_09-24-48_flat_test_DR5_improved_minimal_motion_files_SEED_1/policy.pt" --> on yaw the hind-legs are still too far in --> robot tends to fall over. Got best results with PD 30, 1.5
# This one works better than the above in the precense of yaw target, and is generally also a good policy: policies/IsaacLab policies/flatAmpVision/2025-08-09_21-28-55_flat_test_DR5_improved_minimal_motion_files_SEED_1/policy.pt
# src/controllers/policies/IsaacLab policies/flatAmpVision/2025-08-10_19-29-43_flat_test_DR5_mocap_AMP_for_hardware_SEED_1/policy.pt: way better on flat walking than form Vision, but not better in yaw movements. it also suffers from "tippelschritte", especially for low target speeds.
# src/controllers/policies/IsaacLab policies/flatAmpVision/2025-08-07_16-41-10_flat_test_DR5_improved_minimal_motion_files_SEED_1/policy.pt: this one is worse. Main problem I think are that the feet are not placed forward enough.
# some older policies form a few days before now actually also work better. This means key problems are: accurate vicon state, tape on feet, tune PD gains. But placing front feet more forward definetely also helps!
control_dt: 0.002
decimation: 1
SIMULATION_DT: 0.005
action_dim: 12
obs_dim: 48
action_scale: 0.27
stiffness: 27.0 # 25
damping: 1.5 # 1.5
default_joint_pos:
  - 0.1
  - 0.8
  - -1.5
  - -0.1
  - 0.8
  - -1.5
  - 0.1
  - 1.0
  - -1.5
  - -0.1
  - 1.0
  - -1.5

ISAACLAB_JOINT_ORDER: # breadth-first order, obtained from Aritculation.data.joint_names object
  - "FL_hip_joint" # 0
  - "FR_hip_joint" # 1
  - "RL_hip_joint" # 2
  - "RR_hip_joint" # 3
  - "FL_thigh_joint" # 4
  - "FR_thigh_joint" # 5
  - "RL_thigh_joint" # 6
  - "RR_thigh_joint" # 7
  - "FL_calf_joint" # 8
  - "FR_calf_joint" # 9
  - "RL_calf_joint" # 10
  - "RR_calf_joint" # 11

JOINT_OBSERVATION_UNITREE_TO_ISAAC_LAB_MAPPING:
  [3, 0, 9, 6, 4, 1, 10, 7, 5, 2, 11, 8]
JOINT_ACTION_ISAAC_LAB_TO_UNITREE_MAPPING:
  [1, 5, 9, 0, 4, 8, 3, 7, 11, 2, 6, 10]

ISAAC_LAB_DEFAULT_JOINT_POS: [
    0.1000, # 0
    -0.1000, # 1
    0.1000, # 2
    -0.1000, # 3
    0.8000, # 4
    0.8000, # 5
    1.0000, # 6
    1.0000, # 7
    -1.5000, # 8
    -1.5000, # 9
    -1.5000, # 10
    -1.5000, # 11
  ] # from asset.data.default_joint_pos; corresponds to ISAACLAB_JOINT_ORDER; is used as action offset
